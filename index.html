<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简历编辑器 · Resume Editor</title>
<meta name="description" content="一个可编辑模块的在线简历工具，配色采用色阶系统，支持 GitHub Pages 部署。">
<!-- Fonts: Cormorant Garamond (serif display) + Inter (humanist sans) —— editorial voice -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- html2canvas + jsPDF：用于导出与实时预览一致的 PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* =========================================================================
     Editorial Design System (Claude-inspired, original palette)
     —— warm canvas · serif display · hairline borders · color-block depth
     5 套调色板，每套 = cream canvas + 深色 ink + 一个暖色 accent
     ========================================================================= */
  :root {
    /* 字体 —— 中文优先：思源宋体（标题）+ 思源黑体（正文）
       拉丁字符回退到 EB Garamond / Inter，避免 Cormorant Garamond 不含中文导致回退到系统黑体 */
    --font-serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", "EB Garamond", Georgia, "Times New Roman", serif;
    --font-sans: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

    /* 默认调色板：雾蓝 Mist Blue
       冷调蓝灰 canvas + 深 editorial 蓝 accent —— 呼应旧版深海蓝背景，但不照搬 */
    --canvas: #f4f7fb;          /* 冷调蓝灰底，不黄 */
    --surface-soft: #e8eef6;    /* 比 canvas 深一档，分区背景 */
    --surface-card: #d8e2f0;    /* 卡片底色，再深一档 */
    --surface-strong: #c4d2e6;  /* 强调卡片 / 选中态 */
    --surface-dark: #1a2332;    /* 深色面板（footer / 强对比卡） */
    --surface-dark-elevated: #242f42;
    --on-dark: #f4f7fb;
    --on-dark-soft: #9aa5b8;

    --ink: #1a2332;             /* 主文字色，冷调深蓝黑 */
    --body-strong: #2d3848;
    --body: #4a5568;
    --muted: #718096;
    --muted-soft: #a0aec0;

    --hairline: #d8e2f0;
    --hairline-soft: #e8eef6;

    --accent: #2c5282;          /* editorial 深蓝 accent（沉稳，不刺眼） */
    --accent-active: #1e3a5f;
    --accent-soft: #4a72a8;
    --accent-bg: rgba(44, 82, 130, 0.08);
    --accent-bg-strong: rgba(44, 82, 130, 0.15);
    --on-accent: #ffffff;

    --success: #5b8a5e;
    --warning: #c89028;
    --error: #b44545;

    /* 语义映射 */
    --bg-page: var(--canvas);
    --bg-panel: var(--canvas);
    --bg-card: var(--surface-soft);
    --bg-elevated: #ffffff;
    --bg-input: #ffffff;
    --bg-hover: var(--surface-soft);

    --text-strong: var(--ink);
    --text-primary: var(--body-strong);
    --text-secondary: var(--body);
    --text-tertiary: var(--muted);
    --text-muted: var(--muted-soft);
    --text-on-accent: #ffffff;

    --border-strong: var(--hairline);
    --border-medium: var(--hairline-soft);
    --border-light: rgba(0, 0, 0, 0.04);

    --shadow-sm: 0 1px 2px rgba(26, 23, 20, 0.04);
    --shadow-md: 0 2px 8px rgba(26, 23, 20, 0.06);
    --shadow-lg: 0 8px 24px rgba(26, 23, 20, 0.08);
    --shadow-paper: 0 4px 16px rgba(26, 23, 20, 0.06);

    --r-xs: 4px;
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 12px;
    --r-xl: 16px;
    --r-pill: 9999px;

    --sidebar-w: 250px;
    --editor-w: 410px;

    --ease: cubic-bezier(.4, 0, .2, 1);
    --ease-out: cubic-bezier(0, 0, .2, 1);
  }

  /* 调色板 2：青碧 Teal —— 冷调青绿 canvas + 深青 accent */
  body.palette-slate {
    --canvas: #f2f7f6;
    --surface-soft: #e4efed;
    --surface-card: #d0e2df;
    --surface-strong: #b8d4d0;
    --surface-dark: #182622;
    --surface-dark-elevated: #213530;
    --on-dark: #f2f7f6;
    --on-dark-soft: #8fa8a2;
    --ink: #182622;
    --body-strong: #2a3a36;
    --body: #445550;
    --muted: #6b7c78;
    --muted-soft: #94a8a4;
    --hairline: #d0e2df;
    --hairline-soft: #e4efed;
    --accent: #2d6b5e;
    --accent-active: #1f4d44;
    --accent-soft: #4a8a7c;
    --accent-bg: rgba(45, 107, 94, 0.08);
    --accent-bg-strong: rgba(45, 107, 94, 0.15);
  }

  /* 调色板 3：黛紫 Mauve —— 冷调紫灰 canvas + 深紫 accent */
  body.palette-aubergine {
    --canvas: #f5f3f8;
    --surface-soft: #e8e4f0;
    --surface-card: #d8d0e4;
    --surface-strong: #c4b8d6;
    --surface-dark: #1f1a2a;
    --surface-dark-elevated: #2a243a;
    --on-dark: #f5f3f8;
    --on-dark-soft: #a098b0;
    --ink: #1f1a2a;
    --body-strong: #2d2840;
    --body: #443e58;
    --muted: #6b6480;
    --muted-soft: #948fa8;
    --hairline: #d8d0e4;
    --hairline-soft: #e8e4f0;
    --accent: #6b4a7a;
    --accent-active: #4e3658;
    --accent-soft: #8a6a9c;
    --accent-bg: rgba(107, 74, 122, 0.08);
    --accent-bg-strong: rgba(107, 74, 122, 0.15);
  }

  /* 调色板 4：墨绿 Pine —— 冷调灰绿 canvas + 深松绿 accent */
  body.palette-sage {
    --canvas: #f2f5f2;
    --surface-soft: #e4ebe5;
    --surface-card: #d0dccf;
    --surface-strong: #b8c9b6;
    --surface-dark: #1a221a;
    --surface-dark-elevated: #242f24;
    --on-dark: #f2f5f2;
    --on-dark-soft: #8fa890;
    --ink: #1a221a;
    --body-strong: #2a382a;
    --body: #445244;
    --muted: #6b7c6b;
    --muted-soft: #94a894;
    --hairline: #d0dccf;
    --hairline-soft: #e4ebe5;
    --accent: #3a6b4a;
    --accent-active: #284d34;
    --accent-soft: #5a8a6a;
    --accent-bg: rgba(58, 107, 74, 0.08);
    --accent-bg-strong: rgba(58, 107, 74, 0.15);
  }

  /* 调色板 5：银炭 Slate —— 冷调中性灰 canvas + 深石板灰 accent */
  body.palette-graphite {
    --canvas: #f4f5f7;
    --surface-soft: #e8eaef;
    --surface-card: #d6dae2;
    --surface-strong: #c0c6d2;
    --surface-dark: #1c1e24;
    --surface-dark-elevated: #262930;
    --on-dark: #f4f5f7;
    --on-dark-soft: #9498a4;
    --ink: #1c1e24;
    --body-strong: #2d3038;
    --body: #4a4e58;
    --muted: #6b7080;
    --muted-soft: #9499a8;
    --hairline: #d6dae2;
    --hairline-soft: #e8eaef;
    --accent: #4a5568;
    --accent-active: #2d3848;
    --accent-soft: #6a7588;
    --accent-bg: rgba(74, 85, 104, 0.08);
    --accent-bg-strong: rgba(74, 85, 104, 0.15);
  }

  /* =========================================================================
     全局基础
     ========================================================================= */
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--canvas);
    color: var(--text-primary);
    overflow: hidden;
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    transition: background 0.5s var(--ease), color 0.4s var(--ease);
  }

  /* 背景层次：极淡的 radial 暖晕，强化 canvas 的温度感（不像之前那么强烈的色块） */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, var(--accent-bg) 0%, transparent 55%),
      radial-gradient(ellipse at 100% 100%, var(--surface-soft) 0%, transparent 50%);
    z-index: -2;
    pointer-events: none;
    opacity: 0.7;
  }

  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--hairline);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-soft); }

  /* =========================================================================
     主布局 —— 颜色块代替阴影，hairline 分隔
     ========================================================================= */
  .app {
    display: flex;
    height: 100vh;
    padding: 16px;
    gap: 0;
  }

  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--hairline);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-md);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.4s var(--ease), border-color 0.4s var(--ease);
  }

  .resizer {
    width: 8px;
    cursor: col-resize;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    transition: background 0.2s var(--ease);
  }
  .resizer::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 2px;
    height: 28px;
    background: var(--hairline);
    border-radius: 1px;
    transition: background 0.2s var(--ease);
  }
  .resizer:hover::after,
  .resizer.active::after { background: var(--accent); }
  body.resizing { user-select: none; cursor: col-resize !important; }
  body.resizing * { cursor: col-resize !important; }

  /* =========================================================================
     左侧栏 —— editorial nav，serif brand title
     ========================================================================= */
  .sidebar {
    width: var(--sidebar-w);
    min-width: 210px;
    max-width: 330px;
    flex-shrink: 0;
  }
  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 20px;
  }

  .brand {
    padding: 22px 22px 20px;
    background: var(--surface-dark);
    border-bottom: 1px solid var(--surface-dark-elevated);
    position: relative;
    overflow: hidden;
    transition: background 0.4s var(--ease);
  }
  /* Anthropic 风格的 4 角星标 */
  .brand::before {
    content: '';
    position: absolute;
    top: 18px;
    right: 22px;
    width: 14px;
    height: 14px;
    background: var(--on-dark);
    -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z'/></svg>") no-repeat center / contain;
            mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z'/></svg>") no-repeat center / contain;
    opacity: 0.85;
  }
  .brand h1 {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--on-dark);
    margin-bottom: 2px;
    letter-spacing: -0.3px;
    line-height: 1.1;
  }
  .brand p {
    font-size: 11px;
    color: var(--on-dark-soft);
    letter-spacing: 0.3px;
  }

  .side-section {
    margin-bottom: 14px;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0 0 14px 0;
    border-bottom: 1px solid var(--hairline-soft);
  }
  .side-section:last-child { border-bottom: none; }
  .side-section h3 {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .side-section h3::before {
    content: '';
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* 模板 / 调色板列表 —— editorial item，hairline 分隔 */
  .opt-list { display: flex; flex-direction: column; gap: 2px; }
  .opt-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--r-md);
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    transition: all 0.18s var(--ease);
  }
  .opt-item:hover {
    background: var(--surface-soft);
  }
  .opt-item.active {
    border-color: var(--hairline);
    background: var(--surface-card);
    box-shadow: var(--shadow-sm);
  }
  .opt-item.active .opt-name { color: var(--accent); }
  .opt-swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid var(--hairline);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
  }
  .opt-text { flex: 1; min-width: 0; }
  .opt-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.2;
    transition: color 0.18s var(--ease);
  }
  .opt-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.3;
  }

  /* 模块库按钮 —— editorial grid */
  .module-pool {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .pool-btn {
    padding: 10px 6px;
    border: 1px solid var(--hairline);
    background: var(--bg-elevated);
    color: var(--text-primary);
    border-radius: var(--r-md);
    font-size: 11.5px;
    font-weight: 500;
    transition: all 0.18s var(--ease);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
    line-height: 1.2;
  }
  .pool-btn:hover {
    background: var(--surface-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .pool-btn .icon {
    font-size: 15px;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .pool-btn .icon svg { width: 18px; height: 18px; }

  /* 按钮 —— Claude 风格：primary 用 accent 填充，secondary 用 canvas + hairline */
  .btn {
    padding: 9px 14px;
    border: 1px solid transparent;
    border-radius: var(--r-md);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.18s var(--ease);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    line-height: 1;
    height: 36px;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--on-accent);
    border-color: var(--accent);
  }
  .btn-primary:hover {
    background: var(--accent-active);
    border-color: var(--accent-active);
  }
  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text-primary);
    border-color: var(--hairline);
  }
  .btn-secondary:hover {
    background: var(--surface-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border-color: var(--hairline);
  }
  .btn-ghost:hover {
    color: var(--text-primary);
    background: var(--surface-soft);
  }
  .btn-block { width: 100%; }
  .btn-row { display: flex; flex-direction: column; gap: 6px; }
  .btn-row-row { display: flex; gap: 6px; }
  .btn-row-row > .btn { flex: 1; }

  #fileInput, #jsonInput { display: none; }

  /* 饱和度滑块 */
  .sat-control {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sat-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--hairline);
    outline: none;
    cursor: pointer;
  }
  .sat-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--bg-elevated);
    border: 2px solid var(--accent);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s var(--ease);
  }
  .sat-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
  .sat-slider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--bg-elevated);
    border: 2px solid var(--accent);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
  }
  .sat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sat-label {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 500;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .sat-reset {
    border: 1px solid var(--hairline);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    padding: 3px 8px;
    border-radius: var(--r-sm);
    transition: all 0.15s var(--ease);
  }
  .sat-reset:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .sat-hint {
    font-size: 11px;
    color: var(--muted-soft);
    margin: 0;
    line-height: 1.4;
  }

  /* 版式设置控件 */
  .typo-control {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .typo-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .typo-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.3px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .typo-value {
    font-family: var(--font-serif);
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .typo-select {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--hairline);
    border-radius: var(--r-md);
    font-size: 12.5px;
    color: var(--text-primary);
    background: var(--bg-elevated);
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s var(--ease);
  }
  .typo-select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }

  /* 可折叠区块 */
  .side-section[data-collapsible] .collapsible-header {
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-right: 2px;
    transition: color 0.15s var(--ease);
  }
  .side-section[data-collapsible] .collapsible-header:hover {
    color: var(--accent);
  }
  .side-section[data-collapsible] .collapsible-header:hover::before {
    background: var(--accent);
  }
  .side-section[data-collapsible] .chevron-toggle {
    font-size: 11px;
    color: var(--muted-soft);
    transition: transform 0.2s var(--ease);
    display: inline-block;
  }
  .side-section[data-collapsible].collapsed .chevron-toggle {
    transform: rotate(-90deg);
  }
  .side-section[data-collapsible].collapsed .collapsible-body {
    display: none;
  }

  /* Heroicons 通用样式 */
  .icon-svg {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-svg svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .icon-svg.sm svg { width: 14px; height: 14px; }
  .icon-svg.lg svg { width: 18px; height: 18px; }

  /* =========================================================================
     中间编辑区
     ========================================================================= */
  .editor {
    width: var(--editor-w);
    min-width: 340px;
    max-width: 560px;
    flex-shrink: 0;
  }
  .editor-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    background: var(--bg-panel);
    flex-shrink: 0;
  }
  .editor-header h2 {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--text-strong);
    letter-spacing: -0.3px;

  .save-status {

  }
  .save-status .dot {

  }

  .editor-content {
    flex: 1;
    overflow-y: auto;
    padding: 18px 20px 28px;
  }

  /* 模块卡片 —— editorial card，hairline 边框，无重阴影 */
  .module-card {
    background: var(--bg-elevated);
    border: 1px solid var(--hairline);
    border-radius: var(--r-lg);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
  }
  .module-card:hover {
    border-color: var(--muted-soft);
    box-shadow: var(--shadow-sm);
  }
  .module-card.dragging {
    opacity: 0.5;
    border-color: var(--accent);
    box-shadow: var(--shadow-lg);
  }
  .module-card.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-bg-strong);
  }
  .module-card.collapsed .module-body { display: none; }
  .module-card.hidden-module { opacity: 0.55; }

  .module-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 14px;
    background: var(--surface-soft);
    border-bottom: 1px solid var(--hairline-soft);
    cursor: pointer;
    user-select: none;
    transition: background 0.18s var(--ease);
  }
  .module-card.collapsed .module-head { border-bottom: none; }
  .module-head:hover { background: var(--surface-card); }
  .drag-handle {
    cursor: grab;
    color: var(--muted-soft);
    line-height: 1;
    padding: 2px;
    flex-shrink: 0;
  }
  .drag-handle:active { cursor: grabbing; }
  .module-head .chevron {
    color: var(--muted);
    transition: transform 0.2s var(--ease);
    flex-shrink: 0;
  }
  .module-card.collapsed .module-head .chevron { transform: rotate(-90deg); }
  .module-head .m-icon {
    color: var(--accent);
    flex-shrink: 0;
  }
  .module-title-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-strong);
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 500;
    padding: 2px 5px;
    border-radius: var(--r-xs);
    min-width: 0;
    letter-spacing: -0.2px;
  }
  .module-title-input:hover { background: rgba(0, 0, 0, 0.03); }
  .module-title-input:focus {
    outline: none;
    background: var(--bg-elevated);
    border: 1px solid var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .module-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 26px;
    height: 26px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: var(--r-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s var(--ease);
  }
  .icon-btn:hover {
    background: var(--accent-bg);
    color: var(--accent);
  }
  .icon-btn.danger:hover { color: var(--error); background: rgba(180, 69, 69, 0.08); }

  .module-body { padding: 14px; }

  /* 模块独立字号调节行 */
  .mod-size-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding: 8px 10px;

    border: 1px solid var(--hairline-soft);

    font-weight: 500;
    color: var(--accent);

    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* 表单 */
  .form-group { margin-bottom: 11px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 5px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .form-input, .form-textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--hairline);
    border-radius: var(--r-md);
    font-size: 13px;
    color: var(--text-primary);
    background: var(--bg-elevated);
    transition: all 0.18s var(--ease);
    font-family: inherit;
    line-height: 1.5;
  }
  .form-input:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .form-input::placeholder, .form-textarea::placeholder {
    color: var(--muted-soft);
  }
  .form-textarea { resize: vertical; min-height: 64px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* 列表项卡片 */
  .item-card {
    background: var(--surface-soft);
    border: 1px solid var(--hairline-soft);
    border-radius: var(--r-md);
    padding: 12px;
    margin-bottom: 8px;
    position: relative;
    transition: all 0.18s var(--ease);
  }
  .item-card:last-child { margin-bottom: 0; }
  .item-card:hover {
    background: var(--surface-card);
    border-color: var(--hairline);
  }
  .item-card .item-del {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: rgba(180, 69, 69, 0.08);
    color: var(--error);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.18s var(--ease);
    padding: 0;
  }
  .item-card:hover .item-del { opacity: 1; }
  .item-card .item-del:hover { background: rgba(180, 69, 69, 0.18); }
  .item-card .item-del svg { width: 12px; height: 12px; }
  .item-card .item-body { padding-right: 14px; }

  .add-item-btn {
    width: 100%;
    padding: 9px;
    border: 1px dashed var(--hairline);
    background: transparent;
    color: var(--muted);
    border-radius: var(--r-md);
    font-size: 12px;
    font-weight: 500;
    transition: all 0.18s var(--ease);
    margin-top: 6px;
  }
  .add-item-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-bg);
    border-style: solid;
  }

  /* 标签 */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .tag {
    padding: 4px 10px 4px 12px;
    background: var(--surface-card);
    color: var(--text-primary);
    border: 1px solid var(--hairline);
    border-radius: var(--r-pill);
    font-size: 12px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.18s var(--ease);
  }
  .tag:hover { background: var(--surface-strong); }
  .tag .tag-x {
    cursor: pointer;
    color: var(--muted);
    opacity: 0.7;
    display: inline-flex;
    align-items: center;
    line-height: 1;
  }
  .tag .tag-x:hover { color: var(--error); opacity: 1; }

  .tag-add-row {
    display: flex;

  .tag-add-row .form-input { flex: 1; }
  .tag-add-row .add-btn-sm {

  .empty-hint {
    text-align: center;
    color: var(--muted-soft);

    padding: 14px 8px;

    padding: 18px 22px;

  }
  .preview-actions {
    display: flex;

  }
  .zoom-btn {

  /* A4 简历纸张 */
  .resume-paper {
    width: 210mm;
    background: #ffffff;
    box-shadow: var(--shadow-paper);
    transform-origin: top center;
    transition: transform 0.25s var(--ease);

  .tpl-creative .r-edu-item {

  .tpl-creative .r-edu-item:last-child { margin-bottom: 0; }
  .tpl-creative .r-edu-main {
    font-family: var(--r-font-serif);
    font-size: calc(var(--r-base-size) * 1.15);

  .tpl-creative .r-edu-date {

const STORAGE_KEY = 'resume_editor_v2';
let state = loadState();
let zoomLevel = 0.75;

function defaultState() {

      baseSize: 13,                       // 基准字号 px（10-18）
      lineHeight: 1.7,                    // 行高（1.3-2.2）

    },

      { id: uid(), type: 'basic',       title: '基本信息', visible: true,  data: clone(MODULE_TYPES.basic.data) },
      { id: uid(), type: 'summary',     title: '个人简介', visible: true,  data: clone(MODULE_TYPES.summary.data) },
      { id: uid(), type: 'experience',  title: '工作经历', visible: true,  data: clone(MODULE_TYPES.experience.data) },
      { id: uid(), type: 'education',   title: '教育经历', visible: true,  data: clone(MODULE_TYPES.education.data) },
      { id: uid(), type: 'projects',    title: '项目经历', visible: true,  data: clone(MODULE_TYPES.projects.data) },
      { id: uid(), type: 'skills',      title: '技能特长', visible: true,  data: clone(MODULE_TYPES.skills.data) }
    ]
  };
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed && Array.isArray(parsed.modules) && parsed.modules.length > 0) {
        // 兼容旧数据：补 saturation 字段
        if (typeof parsed.saturation !== 'number') parsed.saturation = 100;
        if (typeof parsed.contrast !== 'number') parsed.contrast = 100;
        if (typeof parsed.brightness !== 'number') parsed.brightness = 100;
        // 兼容旧数据：补 typography 字段
        const defaultTypo = defaultState().typography;
        if (!parsed.typography) parsed.typography = defaultTypo;
        else parsed.typography = { ...defaultTypo, ...parsed.typography };
        // 迁移旧版默认字体（Cormorant Garamond / Inter）到思源宋体 / 思源黑体
        if (parsed.typography.fontSerif === 'Cormorant Garamond') parsed.typography.fontSerif = defaultTypo.fontSerif;
        if (parsed.typography.fontSans === 'Inter') parsed.typography.fontSans = defaultTypo.fontSans;
        return parsed;
      }
    }
  } catch (e) { console.warn('加载失败', e); }
  return defaultState();
}

let saveTimer = null;
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    const t = document.getElementById('saveText');
    t.textContent = '已保存';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { t.textContent = '已自动保存'; }, 1200);
  } catch (e) { console.warn('保存失败', e); }
}

function uid() { return 'm' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function clone(o) { return JSON.parse(JSON.stringify(o)); }
function escapeHtml(t) {
  if (t === null || t === undefined) return '';
  return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ==================== 渲染：左侧栏 ====================
function renderSidebar() {
  document.getElementById('templateList').innerHTML = TEMPLATES.map(t => `
    <div class="opt-item ${state.template === t.id ? 'active' : ''}" data-tpl="${t.id}">
      <div class="opt-text">
        <div class="opt-name">${t.name}</div>
        <div class="opt-desc">${t.desc}</div>
      </div>
    </div>`).join('');

  document.getElementById('paletteList').innerHTML = PALETTES.map(p => `
    <div class="opt-item ${state.palette === p.id ? 'active' : ''}" data-pal="${p.id}">
      <div class="opt-swatch" style="background:${p.swatch}"></div>
      <div class="opt-text">
        <div class="opt-name">${p.name}</div>
        <div class="opt-desc">${p.desc}</div>
      </div>
    </div>`).join('');

  document.getElementById('modulePool').innerHTML = Object.keys(MODULE_TYPES)
    .filter(k => k !== 'basic')
    .map(k => {
      const mt = MODULE_TYPES[k];
      return `<button class="pool-btn" data-add="${k}"><span class="icon icon-svg">${HEROICONS[mt.icon] || HEROICONS.clipboard}</span><span>${mt.name}</span></button>`;
    }).join('');

  document.querySelectorAll('[data-tpl]').forEach(el => el.onclick = () => {
    state.template = el.dataset.tpl;
    saveState(); renderSidebar(); renderPreview();
  });
  document.querySelectorAll('[data-pal]').forEach(el => el.onclick = () => {
    state.palette = el.dataset.pal;
    saveState(); applyPalette(); renderSidebar(); renderPreview();
  });
  document.querySelectorAll('[data-add]').forEach(el => el.onclick = () => {
    addModule(el.dataset.add);
  });
}

function applyPalette() {
  PALETTES.forEach(p => document.body.classList.remove('palette-' + p.id));
  document.body.classList.add('palette-' + state.palette);
  applySaturation();
}

// 饱和度调节：用 CSS filter saturate() 控制整页
function applyColorFilters() {
  const sat = (typeof state.saturation === 'number') ? state.saturation : 100;
  const app = document.querySelector('.app');
  if (app) app.style.filter = `saturate(${sat/100})`;
  const satSlider = document.getElementById('satSlider');
  const satLabel = document.getElementById('satLabel');
  if (satSlider) satSlider.value = sat;
  if (satLabel) satLabel.textContent = sat + '%';
}

// 兼容旧调用名
function applySaturation() { applyColorFilters(); }

function initSaturation() {
  const satSlider = document.getElementById('satSlider');
  const reset = document.getElementById('colorReset');
  if (satSlider) {
    satSlider.addEventListener('input', () => {
      state.saturation = parseInt(satSlider.value, 10);
      applyColorFilters();
      saveState();
    });
  }
  if (reset) {
    reset.addEventListener('click', () => {
      state.saturation = 100;
      applyColorFilters();
      saveState();
      showToast('饱和度已重置');
    });
  }
}

// 可折叠区块：点击标题展开/收起
function initCollapsible() {
  document.querySelectorAll('.side-section[data-collapsible] .collapsible-header').forEach(h => {
    h.addEventListener('click', () => {
      const section = h.closest('.side-section[data-collapsible]');
      if (section) {
        section.classList.toggle('collapsed');
        // 记住折叠状态到 localStorage
        const title = h.textContent.trim().replace('▾', '').trim();
        const key = 'collapse_' + title;
        localStorage.setItem(key, section.classList.contains('collapsed') ? '1' : '0');
      }
    });
  });
  // 恢复折叠状态
  document.querySelectorAll('.side-section[data-collapsible] .collapsible-header').forEach(h => {
    const title = h.textContent.trim().replace('▾', '').trim();
    const key = 'collapse_' + title;
    if (localStorage.getItem(key) === '1') {
      h.closest('.side-section[data-collapsible]').classList.add('collapsed');
    }
  });
}

// 版式设置：字体/字号/行高/间距。改动后实时应用到简历预览。
// 字体显示名映射（用于 label）
const FONT_DISPLAY_NAMES = {
  'Noto Serif SC': '思源宋体',
  'Noto Sans SC': '思源黑体',
  'Cormorant Garamond': 'Cormorant Garamond',
  'EB Garamond': 'EB Garamond',
  'Playfair Display': 'Playfair Display',
  'Georgia': 'Georgia',
  'Inter': 'Inter',
  'PingFang SC': 'PingFang SC',
  'Microsoft YaHei': '微软雅黑'
};
function fontDisplayName(f) { return FONT_DISPLAY_NAMES[f] || f; }

function initTypography() {
  const t = state.typography || defaultState().typography;
  const els = {
    fontSerif:       document.getElementById('typoFontSerif'),
    fontSans:        document.getElementById('typoFontSans'),
    fontSerifLabel:  document.getElementById('typoFontSerifLabel'),
    fontSansLabel:   document.getElementById('typoFontSansLabel'),
    size:      document.getElementById('typoSize'),
    lh:        document.getElementById('typoLh'),
    gap:       document.getElementById('typoGap'),
    pad:       document.getElementById('typoPad'),
    sizeLabel: document.getElementById('typoSizeLabel'),
    lhLabel:   document.getElementById('typoLhLabel'),
    gapLabel:  document.getElementById('typoGapLabel'),
    padLabel:  document.getElementById('typoPadLabel'),
    reset:     document.getElementById('typoReset'),
  };
  // 初始化控件值
  if (els.fontSerif) els.fontSerif.value = t.fontSerif;
  if (els.fontSans)  els.fontSans.value  = t.fontSans;
  if (els.size)      els.size.value      = t.baseSize;
  if (els.lh)        els.lh.value        = t.lineHeight;
  if (els.gap)       els.gap.value       = t.sectionGap;
  if (els.pad)       els.pad.value       = t.pagePadding;
  // 初始化标签
  if (els.fontSerifLabel) els.fontSerifLabel.textContent = fontDisplayName(t.fontSerif);
  if (els.fontSansLabel)  els.fontSansLabel.textContent  = fontDisplayName(t.fontSans);
  if (els.sizeLabel) els.sizeLabel.textContent = t.baseSize + 'px';
  if (els.lhLabel)   els.lhLabel.textContent   = t.lineHeight.toFixed(1);
  if (els.gapLabel)  els.gapLabel.textContent  = t.sectionGap + 'px';
  if (els.padLabel)  els.padLabel.textContent  = t.pagePadding + 'px';

  // 标题字体
  if (els.fontSerif) els.fontSerif.addEventListener('change', () => {
    state.typography.fontSerif = els.fontSerif.value;
    if (els.fontSerifLabel) els.fontSerifLabel.textContent = fontDisplayName(state.typography.fontSerif);
    saveState(); renderPreview();
  });
  // 正文字体
  if (els.fontSans) els.fontSans.addEventListener('change', () => {
    state.typography.fontSans = els.fontSans.value;
    if (els.fontSansLabel) els.fontSansLabel.textContent = fontDisplayName(state.typography.fontSans);
    saveState(); renderPreview();
  });
  // 字号滑块
  if (els.size) els.size.addEventListener('input', () => {
    state.typography.baseSize = parseInt(els.size.value, 10);
    if (els.sizeLabel) els.sizeLabel.textContent = state.typography.baseSize + 'px';
    saveState(); renderPreview();
  });
  // 行高滑块
  if (els.lh) els.lh.addEventListener('input', () => {
    state.typography.lineHeight = parseFloat(els.lh.value);
    if (els.lhLabel) els.lhLabel.textContent = state.typography.lineHeight.toFixed(1);
    saveState(); renderPreview();
  });
  // 模块间距滑块
  if (els.gap) els.gap.addEventListener('input', () => {
    state.typography.sectionGap = parseInt(els.gap.value, 10);
    if (els.gapLabel) els.gapLabel.textContent = state.typography.sectionGap + 'px';
    saveState(); renderPreview();
  });
  // 页面边距滑块
  if (els.pad) els.pad.addEventListener('input', () => {
    state.typography.pagePadding = parseInt(els.pad.value, 10);
    if (els.padLabel) els.padLabel.textContent = state.typography.pagePadding + 'px';
    saveState(); renderPreview();
  });
  // 重置版式
  if (els.reset) els.reset.addEventListener('click', () => {
    state.typography = defaultState().typography;
    saveState();
    initTypography();
    renderPreview();
    showToast('版式已重置');
  });
}

// ==================== 渲染：编辑器 ====================
function renderEditor() {
  const c = document.getElementById('editorContent');
  if (state.modules.length === 0) {
    c.innerHTML = `<div class="empty-hint">还没有任何模块，请从左侧"添加模块"开始创建你的简历。</div>`;
    return;
  }
  c.innerHTML = state.modules.map((m, i) => renderModuleCard(m, i)).join('');
  bindModuleEvents();
}

function renderModuleCard(m, idx) {
  const meta = MODULE_TYPES[m.type] || { icon: 'clipboard' };
  const collapsed = m._collapsed ? 'collapsed' : '';
  const hidden = m.visible ? '' : 'hidden-module';
  // 模块独立字号：null/undefined 表示跟随全局
  const modSize = (typeof m.fontSize === 'number') ? m.fontSize : null;
  const modSizeLabel = modSize === null ? '跟随全局' : (modSize + 'px');
  return `
    <div class="module-card ${collapsed} ${hidden}" data-id="${m.id}">
      <div class="module-head" data-toggle="${m.id}">
        <span class="drag-handle icon-svg" data-drag-handle="${m.id}" title="拖拽排序">${HEROICONS.dragHandle}</span>
        <span class="chevron icon-svg sm">${HEROICONS.chevronDown}</span>
        <span class="m-icon icon-svg">${HEROICONS[meta.icon] || HEROICONS.clipboard}</span>
        <input class="module-title-input" data-rename="${m.id}" value="${escapeHtml(m.title)}" onclick="event.stopPropagation()">
        <div class="module-actions" onclick="event.stopPropagation()">
          <button class="icon-btn icon-svg" data-move-up="${m.id}" title="上移">${HEROICONS.arrowUp}</button>
          <button class="icon-btn icon-svg" data-move-down="${m.id}" title="下移">${HEROICONS.arrowDown}</button>
          <button class="icon-btn icon-svg" data-toggle-vis="${m.id}" title="${m.visible ? '隐藏' : '显示'}">${m.visible ? HEROICONS.eye : HEROICONS.eyeOff}</button>
          ${meta.fixed ? '' : `<button class="icon-btn danger icon-svg" data-del="${m.id}" title="删除模块">${HEROICONS.trash}</button>`}
        </div>
      </div>
      <div class="module-body">
        <div class="mod-size-row" onclick="event.stopPropagation()">
          <label class="form-label" style="margin:0;font-size:10.5px">本模块字号</label>
          <input type="range" min="0" max="20" value="${modSize === null ? 0 : modSize}" step="1" class="sat-slider mod-size-slider" data-mod-size="${m.id}" title="0 = 跟随全局">
          <span class="mod-size-label" id="modSizeLabel_${m.id}">${modSizeLabel}</span>
        </div>
        ${renderModuleBody(m)}
      </div>
    </div>`;
}

function renderModuleBody(m) {
  switch (m.type) {
    case 'basic':       return renderBasicBody(m);
    case 'summary':     return renderSummaryBody(m);
    case 'experience':  return renderExperienceBody(m);
    case 'education':   return renderEducationBody(m);
    case 'projects':    return renderProjectsBody(m);
    case 'skills':      return renderSkillsBody(m);
    case 'certificates':return renderCertsBody(m);
    case 'evaluation':  return renderSummaryBody(m);
    case 'hobbies':     return renderSkillsBody(m);
    case 'custom':      return renderCustomBody(m);
    default: return '';
  }
}

function renderBasicBody(m) {
  const d = m.data;
  return `
    <div class="form-row">

// ==================== 模块事件绑定 ====================
function bindModuleEvents() {
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.onclick = (e) => {
      // 点拖拽手柄、操作按钮、标题输入框时不触发折叠
      if (e.target.closest('.module-actions') ||
          e.target.closest('.drag-handle') ||
          e.target.classList.contains('module-title-input')) return;
      const id = el.dataset.toggle;
      const m = state.modules.find(x => x.id === id);
      if (m) { m._collapsed = !m._collapsed; renderEditor(); }
    };
  });

  document.querySelectorAll('[data-rename]').forEach(el => {
    el.oninput = () => {
      const m = state.modules.find(x => x.id === el.dataset.rename);
      if (m) { m.title = el.value; saveState(); renderPreview(); }
    };
  });

  // 模块独立字号滑块：0 = 跟随全局，1-20 = 具体字号
  document.querySelectorAll('[data-mod-size]').forEach(el => {
    el.oninput = () => {
      const id = el.dataset.modSize;
      const m = state.modules.find(x => x.id === id);
      if (!m) return;
      const v = parseInt(el.value, 10);
      if (v === 0) {
        m.fontSize = null;  // 跟随全局
      } else {
        m.fontSize = v;
      }
      const label = document.getElementById('modSizeLabel_' + id);
      if (label) label.textContent = (v === 0) ? '跟随全局' : (v + 'px');
      saveState();
      renderPreview();
    };
  });

  document.querySelectorAll('[data-toggle-vis]').forEach(el => {
    el.onclick = () => {
      const m = state.modules.find(x => x.id === el.dataset.toggleVis);
      if (m) { m.visible = !m.visible; saveState(); renderEditor(); renderPreview(); }
    };
  });

  // 上移 / 下移模块（移动端友好，点击一下移动一格）
  document.querySelectorAll('[data-move-up]').forEach(el => {
    el.onclick = () => moveModule(el.dataset.moveUp, -1);
  });
  document.querySelectorAll('[data-move-down]').forEach(el => {
    el.onclick = () => moveModule(el.dataset.moveDown, 1);
  });

  document.querySelectorAll('[data-del]').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.del;
      const m = state.modules.find(x => x.id === id);
      if (m && confirm(`确定要删除模块「${m.title}」吗？`)) {
        state.modules = state.modules.filter(x => x.id !== id);
        saveState(); renderEditor(); renderPreview();
        showToast('已删除模块');
      }
    };
  });

  document.querySelectorAll('[data-field]').forEach(el => {
    el.oninput = () => handleFieldChange(el);
  });

  document.querySelectorAll('[data-del-item]').forEach(el => {
    el.onclick = () => {
      const [type, idx] = el.dataset.delItem.split(':');
      const i = parseInt(idx, 10);
      const m = findModuleByType(type);
      if (m && Array.isArray(m.data)) {
        m.data.splice(i, 1);
        saveState(); renderEditor(); renderPreview();
      }
    };
  });

  document.querySelectorAll('[data-add-item]').forEach(el => {
    el.onclick = () => {
      const type = el.dataset.addItem;
      const m = findModuleByType(type);
      if (!m) return;
      const newItem = clone(getEmptyItem(type));
      m.data.push(newItem);
      saveState(); renderEditor(); renderPreview();
    };
  });

  document.querySelectorAll('[data-tag-del]').forEach(el => {
    el.onclick = () => {
      const i = parseInt(el.dataset.tagDel, 10);
      const card = el.closest('.module-card');
      const m = state.modules.find(x => x.id === card.dataset.id);
      if (m && Array.isArray(m.data)) {
        m.data.splice(i, 1);
        saveState(); renderEditor(); renderPreview();
      }
    };
  });

  document.querySelectorAll('[data-tag-add]').forEach(el => {
    el.onclick = () => addTagFromInput(el);
  });
  document.querySelectorAll('[data-tag-input]').forEach(el => {
    el.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); addTagFromInput(el); } };
  });

  bindDragAndDrop();
}

function addTagFromInput(btn) {
  const card = btn.closest('.module-card');
  const input = card.querySelector('[data-tag-input]');
  const m = state.modules.find(x => x.id === card.dataset.id);
  if (!m || !input) return;
  const v = input.value.trim();
  if (v && !m.data.includes(v)) {
    m.data.push(v);
    saveState(); renderEditor(); renderPreview();
  }
  input.value = '';
  input.focus();
}

function findModuleByType(type) {
  return state.modules.find(x => x.type === type);
}

function getEmptyItem(type) {
  switch (type) {
    case 'experience': return { company:'', position:'', startDate:'', endDate:'', description:'' };
    case 'education':  return { school:'', degree:'', startDate:'', endDate:'' };
    case 'projects':   return { name:'', role:'', description:'' };
    case 'certificates': return { name:'', issuer:'', date:'' };
    case 'custom':     return { main:'条目标题', sub:'辅助信息', description:'' };
    default: return {};
  }
}

function handleFieldChange(el) {
  const path = el.dataset.field.split(':');
  const key0 = path[0];
  const card = el.closest('.module-card');
  const m = state.modules.find(x => x.id === card.dataset.id);
  if (!m) return;

  if (key0 === 'basic') {
    const field = path[1];
    m.data[field] = el.value;
  } else if (key0 === 'summary') {
    m.data.content = el.value;
  } else if (path.length === 3) {
    const i = parseInt(path[1], 10);
    const field = path[2];
    if (Array.isArray(m.data) && m.data[i]) {
      m.data[i][field] = el.value;
    }
  }
  saveState();
  renderPreview();
}

// ==================== 拖拽排序 ====================
// 关键：只有 .drag-handle（拖拽手柄）是 draggable，
// 这样点击/拖动模块的其他部分（输入框、滑块、标题）不会触发拖拽。
let dragId = null;
function bindDragAndDrop() {
  document.querySelectorAll('.module-card').forEach(card => {
    const handle = card.querySelector('[data-drag-handle]');
    if (!handle) return;
    // 只有手柄可拖拽
    handle.setAttribute('draggable', 'true');
    handle.addEventListener('dragstart', (e) => {
      dragId = card.dataset.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', dragId); } catch (_) {}
      // 阻止冒泡，避免触发 module-head 的 click（折叠）
      e.stopPropagation();
    });
    handle.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.module-card').forEach(c => c.classList.remove('drag-over'));
      dragId = null;
    });
    // 整个卡片作为 drop 目标
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (!dragId || dragId === card.dataset.id) return;
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (!dragId || dragId === card.dataset.id) return;
      const fromIdx = state.modules.findIndex(x => x.id === dragId);
      const toIdx = state.modules.findIndex(x => x.id === card.dataset.id);
      if (fromIdx < 0 || toIdx < 0) return;
      const [moved] = state.modules.splice(fromIdx, 1);
      state.modules.splice(toIdx, 0, moved);
      saveState(); renderEditor(); renderPreview();
    });
  });
}

// ==================== 模块增删 ====================
// 移动模块排序：dir = -1 上移一格，dir = +1 下移一格
function moveModule(id, dir) {
  const idx = state.modules.findIndex(x => x.id === id);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= state.modules.length) {
    showToast(dir < 0 ? '已在顶部' : '已在底部');
    return;
  }
  const [moved] = state.modules.splice(idx, 1);
  state.modules.splice(newIdx, 0, moved);
  saveState(); renderEditor(); renderPreview();
}

function addModule(type) {
  if (type === 'basic') {
    if (!findModuleByType('basic')) {
      state.modules.unshift({ id: uid(), type: 'basic', title: '基本信息', visible: true, data: clone(MODULE_TYPES.basic.data) });
      saveState(); renderEditor(); renderPreview();
      showToast('已添加基本信息模块');
    } else {
      showToast('基本信息模块已存在');
    }
    return;
  }
  const meta = MODULE_TYPES[type];
  if (!meta) return;
  const m = { id: uid(), type, title: meta.name, visible: true, data: clone(meta.data) };
  state.modules.push(m);
  saveState(); renderEditor(); renderPreview();
  showToast(`已添加「${meta.name}」模块`);
  setTimeout(() => {
    const card = document.querySelector(`.module-card[data-id="${m.id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 80);
}

// ==================== 渲染：预览 ====================
function renderPreview() {
  const paper = document.getElementById('resumePaper');
  const vars = PALETTE_RESUME_VARS[state.palette] || PALETTE_RESUME_VARS.terracotta;
  let styleTag = document.getElementById('paperVars');
  if (!styleTag) {
    styleTag = document.createElement('style');
    styleTag.id = 'paperVars';
    document.head.appendChild(styleTag);
  }
  // 颜色变量（accent + 固定文字色）+ 版式变量（字体/字号/间距）
  const typo = state.typography || defaultState().typography;
  const typoVars = {
    '--r-font-serif': `"${typo.fontSerif}", "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", Georgia, serif`,
    '--r-font-sans': `"${typo.fontSans}", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif`,
    '--r-base-size': typo.baseSize + 'px',
    '--r-line-height': typo.lineHeight,
    '--r-section-gap': typo.sectionGap + 'px',
    '--r-page-padding': typo.pagePadding + 'px'
  };
  const allVars = { ...vars, ...typoVars };
  let css = `.resume-paper { ${Object.entries(allVars).map(([k,v]) => `${k}:${v};`).join('')} }`;
  // 模块独立字号：为每个设置了 fontSize 的模块生成 CSS 规则，
  // 通过 data-mod-id 定位，覆盖该模块内的所有 font-size（按比例缩放）
  state.modules.forEach(m => {
    if (typeof m.fontSize === 'number' && m.fontSize > 0) {
      // 该模块的基准字号 = m.fontSize，全局基准 = typo.baseSize
      // 用比例缩放：该模块内所有 calc(var(--r-base-size) * X) 都按 m.fontSize/typo.baseSize 调整
      // 实现：给该模块设置一个局部 --r-base-size 覆盖
      css += `\n.resume-paper [data-mod-id="${m.id}"] { --r-base-size: ${m.fontSize}px; }`;
    }
  });
  styleTag.textContent = css;

  paper.className = 'resume-paper';
  switch (state.template) {
    case 'creative': paper.innerHTML = renderCreativeTpl(); break;
    case 'classic':  paper.innerHTML = renderClassicTpl();  break;
    default:         paper.innerHTML = renderBusinessTpl();
  }
  applyZoom();

  // 同步把简历内容塞进 #printArea，确保无论是点击「导出 PDF」按钮、
  // 还是直接 Ctrl+P / 浏览器打印 / Chrome --print-to-pdf，都能拿到一份
  // 干净、不带 transform/box-shadow 的内容用于分页打印
  syncPrintArea(allVars);
}

function syncPrintArea(vars) {
  const printArea = document.getElementById('printArea');
  const paper = document.getElementById('resumePaper');
  printArea.innerHTML = '';
  const clone = paper.cloneNode(true);
  // 清掉所有可能干扰分页的样式
  clone.style.transform = '';
  clone.style.boxShadow = '';
  clone.style.margin = '';
  clone.style.width = '';
  // 把当前调色板的色变量内联到 clone，确保打印时颜色不丢失
  if (vars) {
    Object.entries(vars).forEach(([k, v]) => clone.style.setProperty(k, v));
  }
  // 应用色彩滤镜（饱和度+对比度+亮度，与屏幕态保持一致）
  const sat = (typeof state.saturation === 'number') ? state.saturation : 100;
  const con = (typeof state.contrast === 'number') ? state.contrast : 100;
  const bri = (typeof state.brightness === 'number') ? state.brightness : 100;
  clone.style.filter = `saturate(${sat/100}) contrast(${con/100}) brightness(${bri/100})`;
  printArea.appendChild(clone);
}

function getVisibleModules() {
  return state.modules.filter(m => m.visible !== false);
}
function getModule(type) {
  return getVisibleModules().find(m => m.type === type);
}

function renderBusinessTpl() {
  const basic = getModule('basic');
  let html = `<div class="tpl-business">`;
  if (basic) {

function formatDesc(text) {
  if (!text) return '';
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length === 0) return '';
  const hasBullets = lines.some(l => /^\s*[•\-\*]\s/.test(l));
  if (hasBullets) {
    return '<ul>' + lines.map(l => {
      const cleaned = l.replace(/^\s*[•\-\*]\s*/, '');
      return '<li>' + escapeHtml(cleaned) + '</li>';
    }).join('') + '</ul>';
  }
  return '<p>' + escapeHtml(text) + '</p>';
}

// ==================== 缩放 ====================
function applyZoom() {
  const paper = document.getElementById('resumePaper');
  paper.style.transform = `scale(${zoomLevel})`;
  document.getElementById('zoomLevel').textContent = Math.round(zoomLevel * 100) + '%';
  // 移动端：transform: scale() 不改变布局高度，会在缩放后留下大片空白。
  // 用负 margin-bottom 把布局高度收回到视觉缩放后的高度，避免底部出现巨长空白。
  if (isMobile()) {
    const unscaledH = paper.offsetHeight; // 不受 transform 影响的布局高度
    paper.style.marginBottom = `${(unscaledH * zoomLevel) - unscaledH}px`;
  } else {
    paper.style.marginBottom = '';
  }
}
function zoomIn() { zoomLevel = Math.min(zoomLevel + 0.1, 1.5); applyZoom(); }
function zoomOut() { zoomLevel = Math.max(zoomLevel - 0.1, 0.3); applyZoom(); }
function zoomFit() {
  const container = document.getElementById('previewContainer');
  const paper = document.getElementById('resumePaper');
  paper.style.transform = 'scale(1)';
  const cw = container.clientWidth - 60;
  const pw = paper.offsetWidth || 794;
  zoomLevel = Math.min(1, Math.max(0.3, cw / pw));
  applyZoom();
}

// ==================== 拖拽调整列宽 ====================
function initResizers() {
  const r1 = document.getElementById('resizer1');
  const r2 = document.getElementById('resizer2');
  const sidebar = document.getElementById('sidebar');
  const editor = document.getElementById('editorPanel');

  function bind(resizer, target, minW, maxW) {
    let startX = 0, startW = 0;
    resizer.addEventListener('mousedown', (e) => {
      startX = e.clientX;
      startW = target.offsetWidth;
      resizer.classList.add('active');
      document.body.classList.add('resizing');
      const onMove = (ev) => {
        const dx = ev.clientX - startX;
        let nw = startW + dx;
        nw = Math.max(minW, Math.min(maxW, nw));
        target.style.width = nw + 'px';
      };
      const onUp = () => {
        resizer.classList.remove('active');
        document.body.classList.remove('resizing');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }
  bind(r1, sidebar, 200, 320);
  bind(r2, editor, 320, 540);
}

// ==================== 导出 PDF（html2canvas + jsPDF）====================
// 关键改进：直接从实时预览的 DOM 截图生成 PDF，所见即所得；
// 不再强制按 A4 分页 —— 整份简历渲染成"一张连续的长纸"，
// PDF 只有 1 页，页面高度 = 内容实际高度，彻底避免"两页分开/内容切断"。
async function exportPDF() {
  const paper = document.getElementById('resumePaper');
  if (!paper) return;

  // 检查依赖
  if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
    showToast('PDF 库加载失败，请检查网络');
    return;
  }

  // 临时移除 transform（缩放），让纸张以原始尺寸渲染
  const originalTransform = paper.style.transform;
  const originalBoxShadow = paper.style.boxShadow;
  const originalMargin = paper.style.margin;
  paper.style.transform = 'none';
  paper.style.boxShadow = 'none';
  paper.style.margin = '0';

  // 应用色彩滤镜（饱和度+对比度+亮度，与屏幕一致）
  const sat = (typeof state.saturation === 'number') ? state.saturation : 100;
  const con = (typeof state.contrast === 'number') ? state.contrast : 100;
  const bri = (typeof state.brightness === 'number') ? state.brightness : 100;
  const originalFilter = paper.style.filter;
  paper.style.filter = `saturate(${sat/100}) contrast(${con/100}) brightness(${bri/100})`;

  showToast('正在生成 PDF…');

  try {
    // 等待一帧确保样式生效
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    // html2canvas 截图整张简历纸
    const canvas = await html2canvas(paper, {
      scale: 2,              // 2x 清晰度
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      windowWidth: paper.scrollWidth,
      windowHeight: paper.scrollHeight,
    });

    // PDF 宽度固定 210mm（A4 宽度），高度按内容比例计算 —— 单页连续，不分页
    const PDF_W = 210;  // mm
    const imgW = PDF_W;
    const imgH = (canvas.height * imgW) / canvas.width;  // mm，可能 > 297

    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    const { jsPDF } = window.jspdf;
    // 关键：用自定义 format [210, imgH] 创建单页 PDF，页面高度 = 内容高度
    const pdf = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: [PDF_W, imgH]
    });
    pdf.addImage(imgData, 'JPEG', 0, 0, imgW, imgH);

    const name = (getModule('basic')?.data?.name) || 'resume';
    pdf.save(`${name}_简历.pdf`);
    showToast('PDF 已导出');
  } catch (err) {
    console.error('PDF 导出失败', err);
    showToast('PDF 导出失败：' + err.message);
  } finally {
    // 恢复样式
    paper.style.transform = originalTransform;
    paper.style.boxShadow = originalBoxShadow;
    paper.style.margin = originalMargin;
    paper.style.filter = originalFilter;
    applyZoom();
  }
}

// ==================== 导出 HTML ====================
// 生成一个独立可打开的 HTML 文件，只包含简历纸 + 简历相关样式（不包含编辑器 UI 样式）。
// 这样独立打开时背景干净、布局正常、颜色完整。
function exportHTML() {
  const paper = document.getElementById('resumePaper');
  if (!paper) return;

  // 克隆当前简历 DOM
  const clone = paper.cloneNode(true);
  clone.style.transform = 'none';
  clone.style.boxShadow = 'none';
  clone.style.margin = '0 auto';
  clone.style.filter = '';

  // 只提取简历纸相关的 CSS 规则（.tpl-* / .r-* / .resume-paper / @font-face / 通用 reset）
  // 跳过编辑器 UI 的 .app / .sidebar / .editor / .preview / .module-card 等
  let css = '';
  for (const sheet of document.styleSheets) {
    try {
      const rules = sheet.cssRules || sheet.rules;
      if (!rules) continue;
      for (const rule of rules) {
        const text = rule.cssText || '';
        // 跳过打印样式和媒体查询
        if (text.includes('@media print')) continue;
        // 只保留简历相关样式
        const isResumeRelated =
          text.includes('.tpl-') ||
          text.includes('.r-') ||
          text.includes('.resume-paper') ||
          text.includes('@font-face') ||
          text.startsWith('* {') ||
          text.startsWith('*{');
        if (isResumeRelated) {
          css += text + '\n';
        }
      }
    } catch (e) {
      // 跨域样式表跳过
    }
  }

  // 把当前调色板的 --r-* 变量内联到 clone 上，确保独立打开时颜色不丢失
  const vars = PALETTE_RESUME_VARS[state.palette] || PALETTE_RESUME_VARS.terracotta;
  const varDecls = Object.entries(vars).map(([k, v]) => `${k}: ${v};`).join(' ');
  // 同时把变量写到 :root，让 CSS 里引用 var(--r-xxx) 的规则都能生效
  const rootVars = `:root { ${varDecls} }`;

  const name = (getModule('basic')?.data?.name) || 'resume';
  const html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escapeHtml(name)} · 简历</title>
<style>
  /* 基础 reset */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #f0f2f5; }
  body {
    padding: 30px 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  /* 调色板变量 */
  ${rootVars}
  /* 简历模板样式 */
  ${css}
  /* 简历纸容器 */
  .resume-paper {
    width: 210mm;
    max-width: 100%;
    background: #ffffff;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
    color: #1a202c;
    padding: 0;
  }
  /* 打印支持 */
  @media print {
    body { background: #fff; padding: 0; }
    .resume-paper { box-shadow: none !important; width: 210mm !important; }
    @page { size: A4 portrait; margin: 0; }
  }
</style>
</head>
<body>
${clone.outerHTML}
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${name}_简历.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('HTML 已导出');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed || !Array.isArray(parsed.modules)) throw new Error('格式错误');
      state = parsed;
      if (!state.template) state.template = 'business';
      if (!state.palette) state.palette = 'blue';
      saveState(); applyPalette(); renderSidebar(); renderEditor(); renderPreview();
      showToast('JSON 导入成功');
    } catch (err) {
      console.error(err);
      showToast('导入失败：' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

const MOBILE_BREAKPOINT = 768;
const mobileSheetSources = {
  'sheet-modules':  () => [document.getElementById('editorContent')],
  'sheet-spacing':  () => [findSectionByTitle('版式设置')],
  'sheet-skin':     () => [findSectionByTitle('色阶配色'), findSectionByTitle('饱和度')],
  'sheet-template': () => [findSectionByTitle('简历模板')],
  'sheet-more':     () => [findSectionByTitle('添加模块'), findSectionByTitle('导入 / 导出'), findSectionByTitle('数据')]
};
// 记录每个 sheet 中被移入的节点及其原始位置，便于切回桌面时复位
const mobileSheetState = {};

function isMobile() { return window.innerWidth <= MOBILE_BREAKPOINT; }

function findSectionByTitle(title) {
  const headers = document.querySelectorAll('.side-section h3');
  for (const h of headers) {
    const txt = h.textContent.replace('▾', '').trim();
    if (txt === title) return h.closest('.side-section');
  }
  return null;
}

function openMobileSheet(sheetId) {
  if (!isMobile()) return;
  const sheet = document.getElementById(sheetId);
  if (!sheet) return;

  // 先关闭其它已打开的 sheet
  document.querySelectorAll('.mobile-sheet.open').forEach(s => {
    if (s.id !== sheetId) s.classList.remove('open');
  });

  // 首次打开：把对应源节点移入 sheet body
  if (!mobileSheetState[sheetId]) {
    const body = sheet.querySelector('.mobile-sheet-body');
    const nodes = (mobileSheetSources[sheetId] || (() => []))().filter(Boolean);
    mobileSheetState[sheetId] = nodes.map(node => {
      const originalParent = node.parentNode;
      const originalNext = node.nextSibling;
      body.appendChild(node);
      return { node, originalParent, originalNext };
    });
  }

  sheet.classList.add('open');
  document.body.style.overflow = 'hidden';
  // 触发动画后重置 transform，确保再次打开有动画
  const content = sheet.querySelector('.mobile-sheet-content');
  if (content) {
    content.style.animation = 'none';
    void content.offsetWidth;
    content.style.animation = '';
  }
}

function closeMobileSheet(sheetId) {
  const sheet = document.getElementById(sheetId);
  if (!sheet) return;
  sheet.classList.remove('open');
  // 如果没有其它打开的 sheet，恢复 body 滚动
  if (!document.querySelector('.mobile-sheet.open')) {
    document.body.style.overflow = '';
  }
}

function closeAllMobileSheetsAndRestore() {
  Object.keys(mobileSheetState).forEach(sheetId => {
    const sheet = document.getElementById(sheetId);
    if (sheet) sheet.classList.remove('open');
    mobileSheetState[sheetId].forEach(({ node, originalParent, originalNext }) => {
      if (node.parentNode !== originalParent) {
        if (originalNext && originalNext.parentNode === originalParent) {
          originalParent.insertBefore(node, originalNext);
        } else {
          originalParent.appendChild(node);
        }
      }
    });
    delete mobileSheetState[sheetId];
  });
  document.body.style.overflow = '';
}

// 移动端缩放：自动适应屏幕宽度（扣除两侧 padding）
function mobileZoomFit() {
  if (!isMobile()) return;
  const container = document.getElementById('previewContainer');
  const paper = document.getElementById('resumePaper');
  if (!container || !paper) return;
  paper.style.transform = 'scale(1)';
  const cw = container.clientWidth - 24;   // 12px 左右内边距
  const pw = paper.offsetWidth || 794;
  zoomLevel = Math.min(1, Math.max(0.25, cw / pw));
  applyZoom();
}

// 事件绑定：工具栏按钮 / 关闭按钮 / 背景点击 / ESC
function initMobileEvents() {
  document.addEventListener('click', (e) => {
    const toolbarBtn = e.target.closest('.mobile-toolbar-btn');
    if (toolbarBtn) {
      openMobileSheet(toolbarBtn.dataset.sheet);
      return;
    }
    const closeEl = e.target.closest('[data-close]');
    if (closeEl) {
      const sheet = closeEl.closest('.mobile-sheet');
      if (sheet) closeMobileSheet(sheet.id);
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      const open = document.querySelector('.mobile-sheet.open');
      if (open) closeMobileSheet(open.id);
    }
  });

  // 阻止 sheet 内容滚动穿透到背景
  document.querySelectorAll('.mobile-sheet-body').forEach(body => {
    body.addEventListener('touchmove', (e) => e.stopPropagation(), { passive: true });
  });

  // 窗口尺寸变化：切回桌面时复位节点；移动端则重新适应宽度
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (!isMobile()) {
        closeAllMobileSheetsAndRestore();
      } else {
        mobileZoomFit();
      }
    }, 180);
  });

  // 横竖屏切换
  window.addEventListener('orientationchange', () => {
    setTimeout(mobileZoomFit, 300);
  });
}

function initMobile() {
  initMobileEvents();
  if (isMobile()) {
    setTimeout(mobileZoomFit, 250);
  }
}

// ==================== 初始化 ====================
function init() {
  applyPalette();
  renderSidebar();
  renderEditor();
  renderPreview();
  initResizers();
  initSaturation();
  initTypography();
  initCollapsible();
  initMobile();
  setTimeout(() => { isMobile() ? mobileZoomFit() : zoomFit(); }, 220);
}

init();
</script>
